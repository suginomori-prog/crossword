<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>クロスワードパズル</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --cs: 36px; }

html, body {
  font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
  background: #fef9f0;
  height: 100%;
  height: 100dvh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  position: fixed;
  width: 100%;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
  overflow: hidden;
}

header {
  background: #c0704a;
  color: white;
  text-align: center;
  padding: 10px;
  font-size: 18px;
  font-weight: bold;
  letter-spacing: 2px;
}

.toolbar {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 6px;
  background: #fce0cc;
}
.toolbar button {
  padding: 7px 14px;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  touch-action: manipulation;
}
.btn-new  { background: #c0704a; color: white; }
.btn-hint { background: #4a9a4a; color: white; }

/* ---- GRID ---- */
#grid-area {
  display: flex;
  justify-content: center;
  padding: 8px 8px 4px;
  overflow: auto;
  flex: 1;
  min-height: 0;
}

#loading {
  padding: 30px;
  color: #888;
  font-size: 16px;
  text-align: center;
}

table#grid {
  border-collapse: collapse;
  border: 2px solid #444;
}

table#grid td {
  width: var(--cs);
  height: var(--cs);
  border: 1px solid #aaa;
  position: relative;
  text-align: center;
  vertical-align: middle;
  background: white;
  cursor: pointer;
  padding: 0;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

table#grid td.black {
  background: #333;
  border-color: #333;
  cursor: default;
}

table#grid td.word-hl { background: #b8d8f8; }
table#grid td.cell-hl { background: #4da8e8; }

.num {
  position: absolute;
  top: 1px;
  left: 2px;
  font-size: calc(var(--cs) * 0.22);
  color: #555;
  line-height: 1;
  pointer-events: none;
}

.letter {
  font-size: calc(var(--cs) * 0.56);
  font-weight: bold;
  line-height: var(--cs);
  display: block;
  pointer-events: none;
}
.letter.wrong { color: #cc2200; }

/* ---- CURRENT CLUE ---- */
#clue-display {
  margin: 5px 8px;
  padding: 10px 12px;
  background: #fffaf0;
  border-left: 4px solid #c0704a;
  font-size: 20px;
  color: #333;
  min-height: 38px;
  border-radius: 0 4px 4px 0;
  line-height: 1.4;
}
#clue-display .clue-label {
  font-weight: bold;
  color: #c0704a;
  margin-right: 4px;
}


/* ---- HIRAGANA KEYBOARD ---- */
#kana-kb {
  background: #c8ccd8;
  padding: 6px 4px;
  padding-bottom: calc(6px + env(safe-area-inset-bottom, 0px));
  border-top: 2px solid #9aa;
  flex-shrink: 0;
}
#kana-kb .kb-row {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin-bottom: 4px;
}
#kana-kb .kb-row:last-child { margin-bottom: 0; }
#kana-kb button {
  background: white;
  border: 1px solid #bbb;
  border-radius: 8px;
  font-size: 26px;
  font-family: inherit;
  font-weight: bold;
  flex: 1;
  max-width: 80px;
  height: 56px;
  cursor: pointer;
  touch-action: manipulation;
  padding: 0;
}
#kana-kb button:active { background: #d0d0d0; }
#kana-kb button.fn-btn {
  background: #a8aab8;
  font-size: 18px;
}
#kana-kb button.row-btn {
  background: #e8ddd4;
  border-color: #c0704a;
}
#kana-kb button.row-btn.active {
  background: #c0704a;
  color: white;
}

/* ---- DONE OVERLAY ---- */
#done {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 999;
  align-items: center;
  justify-content: center;
}
#done.show { display: flex; }
.done-box {
  background: white;
  border-radius: 16px;
  padding: 28px;
  text-align: center;
  max-width: 280px;
  width: 90%;
}
.done-icon { font-size: 56px; margin-bottom: 8px; }
.done-title { font-size: 22px; font-weight: bold; color: #c0704a; margin-bottom: 6px; }
.done-sub { font-size: 14px; color: #666; margin-bottom: 16px; }
.done-btn {
  background: #c0704a; color: white;
  font-size: 16px; padding: 10px 24px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-family: inherit;
  font-weight: bold;
}
</style>
</head>
<body>
<div id="app">

<header>🌸 クロスワードパズル</header>

<div id="grid-area">
  <div id="loading">問題を作っています…</div>
  <table id="grid" style="display:none"></table>
</div>

<div class="toolbar">
  <button class="btn-new" onclick="newGame()">🔄 新しい問題</button>
  <button class="btn-hint" onclick="useHint()">💡 ヒント</button>
</div>

<div id="clue-display">マスをタップして選んでください</div>


<!-- ひらがなキーボード（2段式） -->
<div id="kana-kb">
  <div class="kb-row" id="kb-chars">
    <button onclick="kType('あ')">あ</button><button onclick="kType('い')">い</button><button onclick="kType('う')">う</button><button onclick="kType('え')">え</button><button onclick="kType('お')">お</button>
  </div>
  <div class="kb-row" id="kb-rows">
    <button class="row-btn active" onclick="kbRow(0)">あ</button>
    <button class="row-btn" onclick="kbRow(1)">か</button>
    <button class="row-btn" onclick="kbRow(2)">さ</button>
    <button class="row-btn" onclick="kbRow(3)">た</button>
    <button class="row-btn" onclick="kbRow(4)">な</button>
    <button class="row-btn" onclick="kbRow(5)">は</button>
    <button class="row-btn" onclick="kbRow(6)">ま</button>
    <button class="row-btn" onclick="kbRow(7)">やらわ</button>
  </div>
  <div class="kb-row">
    <button class="fn-btn" onclick="kDaku()">゛゜</button>
    <button class="fn-btn" onclick="kKo()">小</button>
    <button class="fn-btn" onclick="kType('ー')">ー</button>
    <button class="fn-btn" onclick="kDel()">⌫</button>
    <button class="fn-btn" onclick="kNext()">次→</button>
  </div>
</div>

</div><!-- /app -->

<div id="done">
  <div class="done-box">
    <div class="done-icon">🎉</div>
    <div class="done-title">完成！おめでとう！</div>
    <div class="done-sub" id="done-sub">全部正解！</div>
    <button class="done-btn" onclick="newGame()">もう一度あそぶ</button>
  </div>
</div>

// =====================================================
// クロスワード生成
// =====================================================
const GR = 13; // grid rows
const GC = 13; // grid cols

function mkEmptyGrid() {
  return Array.from({ length: GR }, () => Array(GC).fill(null));
}

function canPlace(grid, chars, row, col, dir) {
  const len = chars.length;

  // 範囲チェック
  if (dir === 'H') {
    if (row < 0 || row >= GR) return false;
    if (col < 0 || col + len > GC) return false;
    // 単語の前後が空きかどうか
    if (col > 0 && grid[row][col - 1] !== null) return false;
    if (col + len < GC && grid[row][col + len] !== null) return false;
  } else {
    if (col < 0 || col >= GC) return false;
    if (row < 0 || row + len > GR) return false;
    if (row > 0 && grid[row - 1][col] !== null) return false;
    if (row + len < GR && grid[row + len][col] !== null) return false;
  }

  // 各マスのチェック
  for (let i = 0; i < len; i++) {
    const r = dir === 'H' ? row : row + i;
    const c = dir === 'H' ? col + i : col;
    const cell = grid[r][c];

    if (cell !== null) {
      // すでに文字がある → 同じ文字でないとNG（交差点）
      if (cell !== chars[i]) return false;
    } else {
      // 空きマス → 垂直方向の隣が空きでないとNG（余計な単語を作らないため）
      if (dir === 'H') {
        if (r > 0 && grid[r - 1][c] !== null) return false;
        if (r < GR - 1 && grid[r + 1][c] !== null) return false;
      } else {
        if (c > 0 && grid[r][c - 1] !== null) return false;
        if (c < GC - 1 && grid[r][c + 1] !== null) return false;
      }
    }
  }
  return true;
}

function placeOnGrid(grid, chars, row, col, dir) {
  for (let i = 0; i < chars.length; i++) {
    const r = dir === 'H' ? row : row + i;
    const c = dir === 'H' ? col + i : col;
    grid[r][c] = chars[i];
  }
}

function rnd(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateCrossword(pool) {
  // 長い単語を優先、シャッフル
  const sorted = rnd(pool).sort((a, b) => b.word.length - a.word.length);
  let best = null;

  for (let attempt = 0; attempt < 25; attempt++) {
    const grid = mkEmptyGrid();
    const placed = []; // { word, hint, row, col, dir }
    const wlist = rnd(sorted).sort((a, b) => b.word.length - a.word.length);

    for (const wo of wlist) {
      const chars = [...wo.word];

      if (placed.length === 0) {
        // 最初の単語：中央に横置き
        const row = Math.floor(GR / 2);
        const col = Math.floor((GC - chars.length) / 2);
        placeOnGrid(grid, chars, row, col, 'H');
        placed.push({ word: wo.word, hint: wo.hint, row, col, dir: 'H' });
        continue;
      }

      // 既存の単語と交差できる候補を探す
      const candidates = [];
      for (const p of placed) {
        const pChars = [...p.word];
        const newDir = p.dir === 'H' ? 'V' : 'H';

        for (let pi = 0; pi < pChars.length; pi++) {
          for (let ci = 0; ci < chars.length; ci++) {
            if (pChars[pi] !== chars[ci]) continue;

            let row, col;
            if (p.dir === 'H') {
              // 既存が横 → 新しいのは縦
              row = p.row - ci;
              col = p.col + pi;
            } else {
              // 既存が縦 → 新しいのは横
              row = p.row + pi;
              col = p.col - ci;
            }

            if (!canPlace(grid, chars, row, col, newDir)) continue;

            // 交差数をスコアとして計算
            let score = 0;
            for (let i = 0; i < chars.length; i++) {
              const r = newDir === 'H' ? row : row + i;
              const c = newDir === 'H' ? col + i : col;
              if (grid[r][c] === chars[i]) score++;
            }
            candidates.push({ row, col, dir: newDir, score });
          }
        }
      }

      if (candidates.length === 0) continue;

      // 最良の候補を選ぶ（交差数が多いほど良い）
      candidates.sort((a, b) => b.score - a.score || Math.random() - 0.5);
      const { row, col, dir } = candidates[0];
      placeOnGrid(grid, chars, row, col, dir);
      placed.push({ word: wo.word, hint: wo.hint, row, col, dir });
    }

    if (!best || placed.length > best.placed.length) {
      best = { grid: grid.map(r => [...r]), placed: [...placed] };
    }
    if (placed.length >= 8) break;
  }

  // グリッドを余白なくトリム
  const g = best.grid;
  let minR = GR, maxR = 0, minC = GC, maxC = 0;
  for (let r = 0; r < GR; r++) {
    for (let c = 0; c < GC; c++) {
      if (g[r][c] !== null) {
        minR = Math.min(minR, r); maxR = Math.max(maxR, r);
        minC = Math.min(minC, c); maxC = Math.max(maxC, c);
      }
    }
  }

  const trimH = maxR - minR + 1;
  const trimW = maxC - minC + 1;
  const trimGrid = Array.from({ length: trimH }, (_, r) =>
    Array.from({ length: trimW }, (_, c) => g[r + minR][c + minC])
  );
  const trimPlaced = best.placed.map(p => ({
    ...p,
    row: p.row - minR,
    col: p.col - minC,
  }));

  return { grid: trimGrid, placed: trimPlaced };
}

function assignNumbers(grid, placed) {
  const rows = grid.length;
  const cols = grid[0].length;
  const numGrid = Array.from({ length: rows }, () => Array(cols).fill(0));
  let n = 1;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (grid[r][c] === null) continue;
      const startsH = (c === 0 || grid[r][c - 1] === null) && c + 1 < cols && grid[r][c + 1] !== null;
      const startsV = (r === 0 || grid[r - 1][c] === null) && r + 1 < rows && grid[r + 1][c] !== null;
      if (startsH || startsV) numGrid[r][c] = n++;
    }
  }

  const numberedWords = placed.map(p => ({ ...p, number: numGrid[p.row][p.col] }));
  return { numGrid, numberedWords };
}

// =====================================================
// ゲーム状態
// =====================================================
const G = {
  grid: [],
  numGrid: [],
  words: [],
  input: [],
  selRow: -1,
  selCol: -1,
  selDir: 'H',
  selIdx: -1,
  hints: 0,
};

// =====================================================
// ゲーム操作
// =====================================================
function newGame() {
  document.getElementById('done').classList.remove('show');
  document.getElementById('loading').style.display = 'block';
  document.getElementById('grid').style.display = 'none';

  setTimeout(() => {
    try {
      const pool = rnd(WORDS).slice(0, 20);
      const { grid, placed } = generateCrossword(pool);
      const { numGrid, numberedWords } = assignNumbers(grid, placed);

      G.grid = grid;
      G.numGrid = numGrid;
      G.words = numberedWords;
      G.input = grid.map(row => row.map(() => ''));
      G.selRow = -1; G.selCol = -1; G.selDir = 'H'; G.selIdx = -1;
      G.hints = 0;

      // マスのサイズをグリッド幅に合わせる
      const gw = grid[0].length;
      const cs = Math.min(36, Math.floor((Math.min(window.innerWidth, 480) - 20) / gw));
      document.documentElement.style.setProperty('--cs', cs + 'px');

      // 最初の横カギを選択
      const first = numberedWords.find(w => w.dir === 'H') || numberedWords[0];
      if (first) selectWord(first);

      renderAll();
      save();

      document.getElementById('loading').style.display = 'none';
      document.getElementById('grid').style.display = '';
    } catch (err) {
      document.getElementById('loading').textContent = 'エラーが発生しました。ページを再読み込みしてください。';
      console.error(err);
    }
  }, 50);
}

function selectWord(w) {
  G.selDir = w.dir;
  G.selRow = w.row;
  G.selCol = w.col;
  G.selIdx = G.words.indexOf(w);
}

function curWord() {
  return G.words[G.selIdx] || null;
}

function wordAt(row, col, dir) {
  return G.words.find(w => {
    if (w.dir !== dir) return false;
    if (dir === 'H') return w.row === row && col >= w.col && col < w.col + w.word.length;
    return w.col === col && row >= w.row && row < w.row + w.word.length;
  }) || null;
}

function wordCells(w) {
  return Array.from({ length: w.word.length }, (_, i) => ({
    row: w.dir === 'H' ? w.row : w.row + i,
    col: w.dir === 'H' ? w.col + i : w.col,
  }));
}

// セルタップ
function cellClick(row, col) {
  if (G.grid[row][col] === null) return;

  if (G.selRow === row && G.selCol === col) {
    // 同じセルをタップ → 方向切り替え
    const newDir = G.selDir === 'H' ? 'V' : 'H';
    const w = wordAt(row, col, newDir);
    if (w) { G.selDir = newDir; G.selIdx = G.words.indexOf(w); }
  } else {
    let w = wordAt(row, col, G.selDir);
    if (!w) {
      const alt = G.selDir === 'H' ? 'V' : 'H';
      w = wordAt(row, col, alt);
      if (w) G.selDir = alt;
    }
    if (w) {
      G.selRow = row; G.selCol = col;
      G.selIdx = G.words.indexOf(w);
    }
  }
  renderAll();
}

// カギ一覧をタップ
function clueClick(idx) {
  const w = G.words[idx];
  G.selDir = w.dir;
  G.selRow = w.row;
  G.selCol = w.col;
  G.selIdx = idx;
  renderAll();
}

// キーボード入力
function kInput(ch) {
  if (G.selRow < 0 || G.grid[G.selRow][G.selCol] === null) return;
  G.input[G.selRow][G.selCol] = ch;
  advance();
  renderAll();
  checkDone();
  save();
}

function advance() {
  const w = curWord();
  if (w) {
    const cells = wordCells(w);
    const idx = cells.findIndex(c => c.row === G.selRow && c.col === G.selCol);
    if (idx >= 0 && idx < cells.length - 1) {
      G.selRow = cells[idx + 1].row;
      G.selCol = cells[idx + 1].col;
      return;
    }
  }
  // 現在の単語で進めない（単語の終わり、または単語が無い）→ もう一方の方向を試す
  const altDir = G.selDir === 'H' ? 'V' : 'H';
  const altW = wordAt(G.selRow, G.selCol, altDir);
  if (altW) {
    const cells = wordCells(altW);
    const idx = cells.findIndex(c => c.row === G.selRow && c.col === G.selCol);
    if (idx >= 0 && idx < cells.length - 1) {
      G.selDir = altDir;
      G.selIdx = G.words.indexOf(altW);
      G.selRow = cells[idx + 1].row;
      G.selCol = cells[idx + 1].col;
    }
  }
}

function retreat() {
  const w = curWord();
  if (!w) return;
  const cells = wordCells(w);
  const idx = cells.findIndex(c => c.row === G.selRow && c.col === G.selCol);
  if (idx > 0) {
    G.selRow = cells[idx - 1].row;
    G.selCol = cells[idx - 1].col;
  }
}

function kDel() {
  if (G.selRow < 0) return;
  if (G.input[G.selRow][G.selCol]) {
    G.input[G.selRow][G.selCol] = '';
  } else {
    retreat();
    G.input[G.selRow][G.selCol] = '';
  }
  renderAll();
  save();
}

function kNext() {
  const w = curWord();
  if (!w) return;
  const cells = wordCells(w);
  const idx = cells.findIndex(c => c.row === G.selRow && c.col === G.selCol);
  if (idx >= 0 && idx < cells.length - 1) {
    G.selRow = cells[idx + 1].row;
    G.selCol = cells[idx + 1].col;
  } else {
    const ni = (G.selIdx + 1) % G.words.length;
    const nw = G.words[ni];
    G.selIdx = ni; G.selDir = nw.dir;
    G.selRow = nw.row; G.selCol = nw.col;
  }
  renderAll();
}

const DAKU = {
  'か':'が','き':'ぎ','く':'ぐ','け':'げ','こ':'ご',
  'さ':'ざ','し':'じ','す':'ず','せ':'ぜ','そ':'ぞ',
  'た':'だ','ち':'ぢ','つ':'づ','て':'で','と':'ど',
  'は':'ば','ひ':'び','ふ':'ぶ','へ':'べ','ほ':'ぼ',
  'が':'か','ぎ':'き','ぐ':'く','げ':'け','ご':'こ',
  'ざ':'さ','じ':'し','ず':'す','ぜ':'せ','ぞ':'そ',
  'だ':'た','ぢ':'ち','づ':'つ','で':'て','ど':'と',
  'ば':'ぱ','び':'ぴ','ぶ':'ぷ','べ':'ぺ','ぼ':'ぽ',
  'ぱ':'は','ぴ':'ひ','ぷ':'ふ','ぺ':'へ','ぽ':'ほ',
};

function kDaku() {
  if (G.selRow < 0) return;
  const ch = G.input[G.selRow][G.selCol];
  if (ch && DAKU[ch]) {
    G.input[G.selRow][G.selCol] = DAKU[ch];
    advance();
    renderAll();
    checkDone();
    save();
  }
}

const KOMOJI = {
  'つ':'っ','っ':'つ',
  'や':'ゃ','ゃ':'や',
  'ゆ':'ゅ','ゅ':'ゆ',
  'よ':'ょ','ょ':'よ',
};

function kKo() {
  if (G.selRow < 0) return;
  const ch = G.input[G.selRow][G.selCol];
  if (ch && KOMOJI[ch]) {
    G.input[G.selRow][G.selCol] = KOMOJI[ch];
    advance();
    renderAll();
    checkDone();
    save();
  }
}

function useHint() {
  if (G.selRow < 0 || G.grid[G.selRow][G.selCol] === null) return;
  G.input[G.selRow][G.selCol] = G.grid[G.selRow][G.selCol];
  G.hints++;
  advance();
  renderAll();
  checkDone();
  save();
}

// =====================================================
// 描画
// =====================================================
function renderAll() {
  renderGrid();
  renderClueDisplay();
}

function renderGrid() {
  const tbl = document.getElementById('grid');
  const rows = G.grid.length;
  const cols = G.grid[0].length;
  const cw = curWord();
  const wordSet = new Set();
  if (cw) wordCells(cw).forEach(c => wordSet.add(c.row + ',' + c.col));

  let html = '';
  for (let r = 0; r < rows; r++) {
    html += '<tr>';
    for (let c = 0; c < cols; c++) {
      const letter = G.grid[r][c];
      if (letter === null) {
        html += '<td class="black"></td>';
        continue;
      }

      const isSel  = G.selRow === r && G.selCol === c;
      const isWord = wordSet.has(r + ',' + c);
      const cls    = isSel ? 'cell-hl' : isWord ? 'word-hl' : '';
      const num    = G.numGrid[r][c];
      const uch    = G.input[r][c];

      const numHtml = num ? `<span class="num">${num}</span>` : '';
      const letHtml = uch
        ? `<span class="letter${uch !== letter ? ' wrong' : ''}">${uch}</span>`
        : '';

      html += `<td${cls ? ` class="${cls}"` : ''} onclick="cellClick(${r},${c})">${numHtml}${letHtml}</td>`;
    }
    html += '</tr>';
  }
  tbl.innerHTML = html;
}

function renderClueDisplay() {
  const el = document.getElementById('clue-display');
  const w = curWord();
  if (!w) {
    el.innerHTML = 'マスをタップして選んでください';
    return;
  }
  const arrow = w.dir === 'H' ? '→' : '↓';
  el.innerHTML = `<span class="clue-label">${w.number}${arrow}</span>${w.hint}`;
}

// =====================================================
// 完成チェック
// =====================================================
function checkDone() {
  for (let r = 0; r < G.grid.length; r++) {
    for (let c = 0; c < G.grid[0].length; c++) {
      if (G.grid[r][c] !== null && G.input[r][c] !== G.grid[r][c]) return;
    }
  }
  const msg = G.hints === 0
    ? 'ヒントなしで全部正解！すごい！'
    : `ヒントを${G.hints}回使って完成！`;
  document.getElementById('done-sub').textContent = msg;
  setTimeout(() => document.getElementById('done').classList.add('show'), 500);
}

// =====================================================
// セーブ／ロード
// =====================================================
function save() {
  try {
    localStorage.setItem('cw_v4', JSON.stringify({
      grid: G.grid, numGrid: G.numGrid, words: G.words,
      input: G.input, selRow: G.selRow, selCol: G.selCol,
      selDir: G.selDir, selIdx: G.selIdx, hints: G.hints,
      cs: getComputedStyle(document.documentElement).getPropertyValue('--cs').trim(),
    }));
  } catch (e) {}
}

function loadSave() {
  try {
    const d = JSON.parse(localStorage.getItem('cw_v4') || 'null');
    if (!d || !d.grid || !d.grid.length) return false;
    G.grid    = d.grid;
    G.numGrid = d.numGrid;
    G.words   = d.words;
    G.input   = d.input;
    G.selRow  = d.selRow;
    G.selCol  = d.selCol;
    G.selDir  = d.selDir;
    G.selIdx  = d.selIdx;
    G.hints   = d.hints;
    if (d.cs) document.documentElement.style.setProperty('--cs', d.cs);
    return true;
  } catch (e) { return false; }
}

// ひらがなキーボード入力
// =====================================================
const KANA_ROWS = [
  ['あ','い','う','え','お'],
  ['か','き','く','け','こ'],
  ['さ','し','す','せ','そ'],
  ['た','ち','つ','て','と'],
  ['な','に','ぬ','ね','の'],
  ['は','ひ','ふ','へ','ほ'],
  ['ま','み','む','め','も'],
  ['や','ゆ','よ','ら','り','る','れ','ろ','わ','を','ん'],
];

function kbRow(idx) {
  const chars = KANA_ROWS[idx];
  const el = document.getElementById('kb-chars');
  el.innerHTML = chars.map(c => `<button onclick="kType('${c}')">${c}</button>`).join('');
  // 行ボタンのハイライト更新
  document.querySelectorAll('#kb-rows .row-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });
}

function canModify(ch) {
  return !!(DAKU[ch] || KOMOJI[ch]);
}

function kType(ch) {
  if (G.selRow < 0 || G.grid[G.selRow][G.selCol] === null) return;
  G.input[G.selRow][G.selCol] = ch;
  if (!canModify(ch)) {
    advance();
  }
  renderAll();
  checkDone();
  save();
}

// 起動
// =====================================================
window.addEventListener('load', () => {
  if (loadSave() && G.grid.length > 0) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('grid').style.display = '';
    renderAll();
  } else {
    newGame();
  }
});
</script>
